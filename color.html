<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Color & Contrast &mdash; 70015</title>
  <meta name="description" content="Pick colors from your screen with the EyeDropper API and check WCAG AA/AAA contrast. Runs in your browser.">
  <link rel="canonical" href="https://70015.net/color">
  <meta property="og:title" content="Color & Contrast &mdash; 70015">
  <meta property="og:description" content="Screen color picker and WCAG contrast checker. No upload.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://70015.net/color">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "70015 Color & Contrast",
    "applicationCategory": "DesignApplication",
    "operatingSystem": "Any",
    "url": "https://70015.net/color",
    "description": "Browser-based screen color picker and WCAG contrast checker.",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/color.css">
  <link rel="icon" href="favicon.ico" sizes="32x32">
  <link rel="icon" href="logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#203848" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1d1c1e" media="(prefers-color-scheme: dark)">
  <script src="js/theme-head.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="header__brand" href="./">
        <span class="header__logo" aria-hidden="true">
          <img src="logo.svg" alt="" width="26" height="26">
        </span>
        <div><h1 class="header__title">TOOLS</h1></div>
      </a>
      <div class="header__actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-toggle__icon" aria-hidden="true">
            <svg class="theme-toggle__light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <svg class="theme-toggle__dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
        </button>
        <button class="menu-btn" id="menuBtn" type="button" aria-label="Open menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </button>
      </div>
    </header>

    <nav class="menu" id="menu" aria-hidden="true">
      <div class="menu__inner">
        <div class="menu__header">
          <span class="menu__title">70015</span>
          <button class="menu__close" id="menuClose" type="button" aria-label="Close menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 L6 18"/><path d="M6 6 L18 18"/></svg>
          </button>
        </div>
        <div class="menu__grid" id="menuGrid"></div>
      </div>
    </nav>

    <main class="main">
      <section class="hero card">
        <div class="hero__blob" aria-hidden="true"></div>
        <div class="hero__content">
          <h1 class="hero__title">Color & Contrast</h1>
          <p class="hero__desc">Pick colors from your screen and check WCAG AA/AAA contrast. No upload.</p>
        </div>
      </section>

      <section class="panel card">
        <div class="settings__group">
          <span class="settings__label">Colors</span>
          <div class="color-row" id="fgRow" data-role="fg">
            <div class="color-row__main">
              <button class="color-swatch" id="fgSwatch" aria-label="Foreground color"></button>
              <input type="color" id="fgPicker" class="color-native" value="#203848">
              <div class="color-row__fields">
                <label class="field"><span>HEX</span><input id="fgHex" type="text" value="#203848"></label>
              </div>
              <button class="btn btn--secondary btn--sm color-row__pick" id="fgPick" type="button">Pick</button>
            </div>
            <div class="color-row__values" id="fgValues"></div>
          </div>
          <div class="color-row" id="bgRow" data-role="bg">
            <div class="color-row__main">
              <button class="color-swatch" id="bgSwatch" aria-label="Background color"></button>
              <input type="color" id="bgPicker" class="color-native" value="#ffffff">
              <div class="color-row__fields">
                <label class="field"><span>HEX</span><input id="bgHex" type="text" value="#ffffff"></label>
              </div>
              <button class="btn btn--secondary btn--sm color-row__pick" id="bgPick" type="button">Pick</button>
            </div>
            <div class="color-row__values" id="bgValues"></div>
          </div>
          <p class="settings__note" id="pickHint">Click a swatch or HEX to choose, or use Pick to grab from the screen.</p>
        </div>
      </section>

      <section class="panel card">
        <div class="settings__group">
          <span class="settings__label">Contrast</span>
          <div class="contrast">
            <div class="contrast__ratio">
              <span class="contrast__number" id="ratioNumber">&mdash;</span>
              <span class="contrast__unit">:1</span>
            </div>
            <div class="contrast__badges" id="badges"></div>
          </div>
          <div class="contrast__preview" id="preview">
            <p class="contrast__sample contrast__sample--lg">Aa Bb Cc 1234</p>
            <p class="contrast__sample">The quick brown fox jumps over the lazy dog.</p>
            <p class="contrast__sample contrast__sample--bold"><strong>Bold text sample</strong></p>
          </div>
        </div>
      </section>

      <section class="panel card">
        <div class="settings__group">
          <span class="settings__label">Swap</span>
          <div class="settings__row snapshot__controls">
            <button class="btn btn--secondary btn--sm" id="swapBtn" type="button">Swap FG &harr; BG</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer"><p><a href="https://github.com/fivood/70015" target="_blank" rel="noopener">@70015</a></p></footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/menu.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/menu-data.js"></script>
  <script src="js/color.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>70015 — Web Toolbox</title>
  <meta name="description" content="70015 是一个暖灰色调的个人 Web 工具箱，提供图片转换、配色板等设计师与产品经理常用工具。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='15' y='25' width='70' height='50' rx='8' fill='none' stroke='%23203848' stroke-width='6'/><circle cx='35' cy='45' r='7' fill='%23203848'/><path d='M20 70 L40 50 L55 65 L70 45 L80 60 L80 75 L20 75 Z' fill='%23203848'/></svg>">
  <script>
    (function () {
      try {
        const theme = localStorage.getItem('70015-theme');
        document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="header__brand" href="./">
        <span class="header__logo" aria-hidden="true">
          <svg viewBox="0 0 46 46" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
            <rect x="8" y="8" width="30" height="30" rx="6"/>
            <path d="M16 30 L30 16"/>
            <circle cx="32" cy="14" r="3" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <div>
          <h1 class="header__title">70015</h1>
        </div>
      </a>
      <div class="header__actions">
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
          <span class="theme-toggle__icon" aria-hidden="true">
            <svg class="theme-toggle__light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <svg class="theme-toggle__dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
        </button>
      </div>
    </header>

    <main class="main">
      <section class="hero card">
        <div class="hero__blob" aria-hidden="true"></div>
        <div class="hero__content">
          <h2 class="hero__title">个人 Web 工具箱</h2>
          <p class="hero__desc">针对设计师与产品经理的日常需求，提供图片转换、配色提取、Base64 图片互换等纯前端小工具。所有处理在浏览器内完成，数据不上传服务器。</p>
        </div>
      </section>

      <section class="tools card">
        <div class="tools__header">
          <h3 class="tools__title">全部工具</h3>
          <span class="tools__count">3 个模块</span>
        </div>
        <div class="tools__grid">
          <a class="tool-card" href="converter">
            <span class="tool-card__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M3 15 L8 10 L12 14 L21 5"/>
              </svg>
            </span>
            <div class="tool-card__info">
              <h4 class="tool-card__name">图片转换</h4>
              <p class="tool-card__desc">WebP / AVIF / JPEG / PNG / ICO 批量转换，支持压缩、裁剪与打包下载</p>
            </div>
            <span class="tool-card__arrow" aria-hidden="true">→</span>
          </a>

          <a class="tool-card" href="palette">
            <span class="tool-card__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2 L12 22"/>
                <path d="M2 12 L22 12"/>
                <circle cx="12" cy="12" r="4"/>
              </svg>
            </span>
            <div class="tool-card__info">
              <h4 class="tool-card__name">配色板</h4>
              <p class="tool-card__desc">从参考图中提取主色调，生成 Web 设计色板，支持复制与导出 JSON</p>
            </div>
            <span class="tool-card__arrow" aria-hidden="true">→</span>
          </a>
          <a class="tool-card" href="base64">
            <span class="tool-card__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M8 16l-3-4 3-4"/>
                <path d="M16 8l3 4-3 4"/>
                <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
              </svg>
            </span>
            <div class="tool-card__info">
              <h4 class="tool-card__name">Base64 图片互换</h4>
              <p class="tool-card__desc">图片转 Base64 DataURL，或粘贴 Base64 字符串还原为图片</p>
            </div>
            <span class="tool-card__arrow" aria-hidden="true">→</span>
          </a>
        </div>
      </section>
    </main>

    <footer class="footer" aria-hidden="true"></footer>
  </div>
  <script src="js/theme.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>70015 — Online image tools</title>
  <meta name="description" content="Browser-based tools for images: convert formats, extract color palettes, swap Base64. No upload, no server.">
  <link rel="canonical" href="https://70015.net/">
  <meta property="og:title" content="70015 — Online image tools">
  <meta property="og:description" content="Browser-based tools for images. Convert formats, extract palettes, swap Base64. No upload.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://70015.net/">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "70015",
    "url": "https://70015.net/",
    "description": "Browser-based image tools with no server upload."
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='15' y='25' width='70' height='50' rx='8' fill='none' stroke='%23203848' stroke-width='6'/><circle cx='35' cy='45' r='7' fill='%23203848'/><path d='M20 70 L40 50 L55 65 L70 45 L80 60 L80 75 L20 75 Z' fill='%23203848'/></svg>">
  <script>
    (function () {
      try {
        const theme = localStorage.getItem('70015-theme');
        document.documentElement.setAttribute('data-theme', theme === 'dark' ? 'dark' : 'light');
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="header__brand" href="./">
        <span class="header__logo" aria-hidden="true">
          <svg viewBox="0 0 46 46" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
            <rect x="8" y="8" width="30" height="30" rx="6"/>
            <path d="M16 30 L30 16"/>
            <circle cx="32" cy="14" r="3" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <div>
          <h1 class="header__title">TOOLS</h1>
        </div>
      </a>
      <div class="header__actions">
      </a>
      <div class="header__actions">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-toggle__icon" aria-hidden="true">
            <svg class="theme-toggle__light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <svg class="theme-toggle__dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
        </button>
      </div>
    </header>

    <main class="main">
      <section class="tools card" style="margin-top: var(--space-lg);">
        <div class="tools__header">
          <h1 class="tools__title">Tools</h1>
          <span class="tools__count">3 tools</span>
        </div>
        <div class="tools__grid">
          <a class="tool-card" href="converter">
            <span class="tool-card__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M3 15 L8 10 L12 14 L21 5"/>
              </svg>
            </span>
            <div class="tool-card__info">
              <h4 class="tool-card__name">Image Converter</h4>
              <p class="tool-card__desc">Batch convert to WebP / AVIF / JPEG / PNG / ICO. Resize, compress, zip.</p>
            </div>
            <span class="tool-card__arrow" aria-hidden="true">→</span>
          </a>

          <a class="tool-card" href="palette">
            <span class="tool-card__icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 2 L12 22"/>
                <path d="M2 12 L22 12"/>
                <circle cx="12" cy="12" r="4"/>
              </svg>
            </span>
            <div class="tool-card__info">
              <h4 class="tool-card__name">Color Palette</h4>
              <p class="tool-card__desc">Extract dominant colors from images. Copy HEX, export JSON.</p>
            </div>
            <span class="tool-card__arrow" aria-hidden="true">→</span>
          </a>
          <a class="tool-card" href="base64">
            <span class="tool-card__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M8 16l-3-4 3-4"/>
                <path d="M16 8l3 4-3 4"/>
                <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
              </svg>
            </span>
            <div class="tool-card__info">
              <h4 class="tool-card__name">Base64 Swap</h4>
              <p class="tool-card__desc">Image → Base64 Data URL, or paste Base64 to get the image back.</p>
            </div>
            <span class="tool-card__arrow" aria-hidden="true">→</span>
          </a>
        </div>
      </section>
    </main>

    <footer class="footer"><p><a href="https://github.com/fivood/70015" target="_blank" rel="noopener">@70015</a></p></footer>
  </div>
  <script src="js/theme.js"></script>
</body>
</html>

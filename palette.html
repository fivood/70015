<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>配色板 · 70015</title>
  <meta name="description" content="从图片中提取配色方案，支持批量上传、文件夹拖拽，生成 Web 设计参考色板。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/palette.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='15' y='25' width='70' height='50' rx='8' fill='none' stroke='%23fff' stroke-width='6'/><circle cx='35' cy='45' r='7' fill='%23fff'/><path d='M20 70 L40 50 L55 65 L70 45 L80 60 L80 75 L20 75 Z' fill='%23fff'/></svg>">
</head>
<body>
  <div class="app">
    <header class="header">
      <a class="header__brand" href="./">
        <span class="header__logo" aria-hidden="true">
          <svg viewBox="0 0 46 46" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
            <rect x="8" y="8" width="30" height="30" rx="6"/>
            <path d="M16 30 L30 16"/>
            <circle cx="32" cy="14" r="3" fill="currentColor" stroke="none"/>
          </svg>
        </span>
        <div>
          <h1 class="header__title">70015</h1>
        </div>
      </a>
      <button class="menu-btn" id="menuBtn" type="button" aria-label="打开菜单" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <circle cx="5" cy="12" r="2"/>
          <circle cx="12" cy="12" r="2"/>
          <circle cx="19" cy="12" r="2"/>
        </svg>
      </button>
    </header>

    <nav class="menu" id="menu" aria-hidden="true">
      <div class="menu__inner">
        <div class="menu__header">
          <span class="menu__title">70015 Tools</span>
          <button class="menu__close" id="menuClose" type="button" aria-label="关闭菜单">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M18 6 L6 18"/>
              <path d="M6 6 L18 18"/>
            </svg>
          </button>
        </div>
        <div class="menu__grid">
        <a class="menu__item" href="./">
          <span class="menu__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M3 15 L8 10 L12 14 L21 5"/>
            </svg>
          </span>
          <span class="menu__label">图片转换</span>
        </a>
        <a class="menu__item is-active" href="palette">
          <span class="menu__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 2 L12 22"/>
              <path d="M2 12 L22 12"/>
              <circle cx="12" cy="12" r="4"/>
            </svg>
          </span>
          <span class="menu__label">配色板</span>
        </a>
      </div>
    </div>
    </nav>

    <main class="main">
      <section class="hero card">
        <div class="hero__blob" aria-hidden="true"></div>
        <div class="hero__content">
          <h2 class="hero__title">图片配色板生成器</h2>
          <p class="hero__desc">上传配色参考图或拖拽整个文件夹，自动提取主色调并生成 Web 设计色板。支持复制 HEX / RGB / CSS 变量，也支持批量导出 JSON。</p>
        </div>
      </section>

      <section class="panel card">
        <div class="upload" id="dropZone">
          <input type="file" id="fileInput" class="upload__input" accept="image/*" webkitdirectory directory multiple aria-label="选择图片或文件夹">
          <div class="upload__content">
            <div class="upload__icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M32 44 V14"/>
                <path d="M22 24 L32 14 L42 24"/>
                <path d="M12 44 L12 50 H52 V44"/>
              </svg>
            </div>
            <p class="upload__title">拖拽图片或文件夹到这里，或点击上传</p>
            <p class="upload__hint">支持批量上传，自动提取每张图的主色调</p>
          </div>
        </div>

        <div class="settings">
          <div class="settings__group">
            <div class="settings__row">
              <label class="settings__label">提取颜色数量 <span class="settings__value" id="colorCountValue">5</span></label>
              <input class="range" type="range" id="colorCount" min="2" max="10" value="5">
            </div>
          </div>

          <div class="settings__group">
            <div class="settings__row">
              <label class="settings__label">采样精度 <span class="settings__value" id="sampleValue">中</span></label>
              <input class="range" type="range" id="samplePrecision" min="1" max="3" value="2">
            </div>
            <p class="settings__note">精度越高提取越慢，结果越细腻；精度越低速度越快。</p>
          </div>
        </div>
      </section>

      <section class="actions card" id="actionsPanel" hidden>
        <div class="actions__info">
          <span id="fileCount">0 张图片</span>
        </div>
        <div class="actions__btns">
          <button class="btn btn--secondary" id="clearBtn" type="button">清空</button>
          <button class="btn btn--primary" id="exportBtn" type="button">导出 JSON</button>
        </div>
      </section>

      <section class="palette-grid" id="paletteGrid" aria-live="polite"></section>
    </main>

    <footer class="footer" aria-hidden="true"></footer>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/menu.js"></script>
  <script src="js/palette.js"></script>
</body>
</html>
